<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.svg">
  <link rel="stylesheet" href="../../assets/styles/global.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../assets/components/donate-steps-modal.css">
  <link rel="stylesheet" href="../../assets/components/donate-quick-modal.css">
  <title>Zoos — Online Zoo</title>
</head>

<body>
  <header class="header">
    <div class="header__inner">
      <a href="/"><img class="header__logo" src="../../assets/icons/logo.svg" alt="Online Zoo"></a>
      <nav class="header__nav">
        <ul>
          <li><a class="header__nav-link" href="../landing/">About</a></li>
          <li><a class="header__nav-link" href="../map/">Map</a></li>
          <li><a class="header__nav-link active" href="#">Zoos</a></li>
          <li><a class="header__nav-link" href="../contact-us/">Contact us</a></li>
          <li><a class="header__nav-link" href="#">Design</a></li>
        </ul>
      </nav>
      <nav class="header__social">
        <ul>
          <li><a class="header__social-link" href="https://www.youtube.com/c/RSSchool/" aria-label="YouTube" target="_blank"><img src="../../assets/icons/youtube.svg" alt="YouTube"></a></li>
          <li><a class="header__social-link" href="https://www.instagram.com/rsschool_en/" aria-label="Instagram" target="_blank"><img src="../../assets/icons/instagram.svg" alt="Instagram"></a></li>
          <li><a class="header__social-link" href="https://www.facebook.com/RollingScopesSchool/" aria-label="Facebook" target="_blank"><img src="../../assets/icons/facebook.svg" alt="Facebook"></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="zoos-layout">
    <aside class="zoos-sidebar">
      <div class="zoos-sidebar__header">
        <div class="zoos-sidebar__live">
          <span class="zoos-sidebar__live-text">LIVE</span>
          <img class="zoos-sidebar__live-icon" src="../../assets/icons/live-camera.svg" alt="Live">
        </div>
        <button class="zoos-sidebar__expand" aria-label="Expand sidebar"><img src="../../assets/icons/expand.svg" alt="Expand"></button>
      </div>
      <nav class="zoos-sidebar__nav" id="sidebarNav"></nav>
      <button class="zoos-sidebar__scroll-down" aria-label="Scroll down">&#8964;</button>
    </aside>

    <main class="zoos-main">
      <div class="zoos-content container">
        <div class="zoos-content__header">
          <h1 class="zoos-content__title" id="animalTitle"></h1>
          <button class="zoos-content__donate-btn button_orange">Donate Now</button>
        </div>

        <div class="zoos-player">
          <div class="zoos-player__label" id="playerLabel"></div>
          <div class="zoos-player__frame">
            <img class="zoos-player__img" id="playerImg" src="" alt="">
            <div class="zoos-player__overlay">
              <button class="zoos-player__play" aria-label="Play"></button>
            </div>
            <div class="zoos-player__logo">
              <img src="../../assets/icons/logo-1.svg" alt="Online Zoo">
            </div>
            <div class="zoos-player__controls">
              <div class="zoos-player__controls-left">
                <button class="zoos-player__ctrl-btn" aria-label="Play">&#9654;</button>
                <button class="zoos-player__ctrl-btn" aria-label="Next">&#9654;&#9654;</button>
                <button class="zoos-player__ctrl-btn" aria-label="Volume">&#128266;</button>
                <span class="zoos-player__live-badge">• LIVE</span>
              </div>
            </div>
          </div>
        </div>

        <div class="zoos-more-views">
          <h3 class="zoos-more-views__title">More Live Views</h3>
          <div class="zoos-more-views__slider">
            <button class="zoos-more-views__arrow" aria-label="Previous">&#8592;</button>
            <div class="zoos-more-views__cards" id="camCards"></div>
            <button class="zoos-more-views__arrow" aria-label="Next">&#8594;</button>
          </div>
        </div>
      </div>

      <section class="zoos-donation">
        <div class="zoos-donation__inner container">
          <div class="zoos-donation__content">
            <h3 class="zoos-donation__title" id="donationTitle"></h3>
            <p class="zoos-donation__text" id="donationText"></p>
          </div>
          <div class="zoos-donation__form">
            <p class="subheader">Quick Donate</p>
            <form class="donate-form">
              <input class="donate-form__input" placeholder="$ Donation Amount">
              <button class="donate-form__btn button_orange" type="submit"></button>
            </form>
          </div>
        </div>
      </section>

      <div class="zoos-content container">
        <div class="zoos-fact">
          <h2 class="zoos-fact__title">Did you know?</h2>
          <p class="zoos-fact__text" id="factText"></p>
        </div>

        <div class="zoos-info">
          <table class="zoos-info__table">
            <tbody id="infoTable"></tbody>
          </table>
          <img class="zoos-info__photo" id="infoPhoto" src="" alt="">
        </div>

        <p class="zoos-description" id="description"></p>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div class="footer__inner container">
      <div class="footer__top">
        <div class="footer__logos">
          <a href="/"><img src="../../assets/icons/logo-1.svg" alt="Online Zoo"></a>
          <img src="../../assets/icons/yem-digital.svg" alt="Yem Digital">
          <img src="../../assets/icons/rs-school-js-logo.svg" alt="RS School">
        </div>
        <nav class="footer__nav">
          <ul>
            <li><a href="../landing/">About</a></li>
            <li><a href="../map/">Map</a></li>
            <li><a href="#">Zoos</a></li>
            <li><a href="../contact-us/">Contact Us</a></li>
          </ul>
        </nav>
        <button class="footer__donate">Donate for Volunteers</button>
      </div>
      <hr class="footer__divider">
      <div class="footer__bottom">
        <div class="footer__copy">
          <span>© 2021 DinaK</span>
          <span>© Yem Digital</span>
          <span>© RSSchool</span>
        </div>
        <nav class="footer__social">
          <ul>
            <li><a class="footer__social-link" href="https://www.youtube.com/c/RSSchool/" aria-label="YouTube" target="_blank"><img src="../../assets/icons/youtube.svg" alt="YouTube"></a></li>
            <li><a class="footer__social-link" href="https://www.instagram.com/rsschool_en/" aria-label="Instagram" target="_blank"><img src="../../assets/icons/instagram.svg" alt="Instagram"></a></li>
            <li><a class="footer__social-link" href="https://www.facebook.com/RollingScopesSchool/" aria-label="Facebook" target="_blank"><img src="../../assets/icons/facebook.svg" alt="Facebook"></a></li>
          </ul>
        </nav>
      </div>
    </div>
  </footer>

  <script src="../../assets/components/donate-steps-modal.js"></script>
  <script src="../../assets/components/donate-quick-modal.js"></script>
  <script src="script.js"></script>
</body>

</html>
